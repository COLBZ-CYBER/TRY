<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - White SMM Panel</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FontAwesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Body & Background */
body {
  background: #f8f9fa;
  color: #212529;
  font-family: 'Arial', sans-serif;
  overflow-x: hidden;
  position: relative;
}

/* Fade-in animation for card */
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Card */
.card {
  background: #FFF;
  border-radius: 15px;
  border: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeInUp 1s ease forwards;
  opacity: 0;
  transform: translateY(30px);
  transition: transform 0.3s;
}
.card:hover { transform: translateY(-5px); }

/* Form Inputs */
input {
  background: #f1f3f5 !important;
  border: 1px solid #ced4da !important;
  color: #212529 !important;
  border-radius: 5px;
  transition: all 0.3s;
}
input:focus {
  border-color: #0d6efd !important;
  box-shadow: 0 0 8px rgba(13,110,253,0.3);
  background: #fff !important;
}

/* Buttons */
.btn-blue {
  background: #0d6efd;
  border: none;
  font-weight: bold;
  transition: all 0.3s;
}
.btn-blue:hover {
  background: #0b5ed7;
  transform: scale(1.05);
}

/* Headings & Links */
h1 { color: #0d6efd; font-weight: bold; }
a { color: #0d6efd; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Alert styles */
.alert { border-radius: 8px; font-size: 0.9rem; padding: 0.75rem 1rem; }

/* Floating Social Icons */
.floating-icons i {
  position: absolute;
  font-size: 2rem;
  opacity: 0.7;
  animation: float 6s infinite ease-in-out;
}

.floating-icons i:hover { opacity: 1; transform: scale(1.3); }

/* Keyframes for floating motion */
@keyframes float {
  0% { transform: translateY(0) translateX(0) rotate(0deg); }
  25% { transform: translateY(-20px) translateX(10px) rotate(15deg); }
  50% { transform: translateY(0px) translateX(-10px) rotate(-15deg); }
  75% { transform: translateY(15px) translateX(5px) rotate(10deg); }
  100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
}

/* Different starting positions */
#fb { top: 10%; left: 5%; color: #1877f2; animation-duration: 7s; }
#ig { top: 20%; right: 10%; color: #e1306c; animation-duration: 6s; }
#yt { bottom: 15%; left: 20%; color: #ff0000; animation-duration: 8s; }
#tt { bottom: 10%; right: 5%; color: #000000; animation-duration: 5s; }
</style>
</head>

<body>

<!-- Floating Social Media Icons -->
<div class="floating-icons">
  <i id="fb" class="fab fa-facebook"></i>
  <i id="ig" class="fab fa-instagram"></i>
  <i id="yt" class="fab fa-youtube"></i>
  <i id="tt" class="fab fa-tiktok"></i>
</div>

<!-- Container -->
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="col-md-5">

    <!-- Signup Card -->
    <div class="card p-4 shadow-lg">

      <h1 class="text-center mb-4">Welcome to ZOROXSMM!</h1>
      <h1 class="text-center mb-4">Sign Up</h1>

      <!-- Example Alerts -->
      <div class="alert alert-danger d-none" id="error">Error message here</div>
      <div class="alert alert-success d-none" id="success">Success message here</div>

      <!-- Signup Form -->
      <form id="signupForm">
        <div class="mb-3">
          <label class="form-label"><i class="far fa-user-circle"></i> Username</label>
          <input type="text" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <input type="password" class="form-control" placeholder="Enter password" required>
        </div>

        <div class="mb-3">
          <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" class="form-control" placeholder="Confirm password" required>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="terms" required>
          <label class="form-check-label" for="terms">I agree to the terms</label>
        </div>

        <button type="submit" class="btn btn-blue w-100">Sign Up</button>
      </form>

      <p class="text-center mt-3">
        Already have an account? <a href="#">Login</a>
      </p>

    </div>

  </div>
</div>

<!-- Optional Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Optional JS for Alerts -->
<script>
document.getElementById('signupForm').addEventListener('submit', function(e){
    e.preventDefault();
    const success = document.getElementById('success');
    success.classList.remove('d-none');
    success.textContent = "Account created successfully!";
});
</script>

</body>
</html>
